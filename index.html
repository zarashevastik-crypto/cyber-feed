<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER FEED 4.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
        }
        .cyber-title {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.7);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4">

    <header class="flex justify-between items-center max-w-md w-full mx-auto bg-slate-900/80 border border-slate-800 p-4 rounded-2xl backdrop-blur-md mb-4">
        <h1 class="cyber-title text-xl font-bold text-cyan-400">⚡ CF_4.0</h1>
        <div class="flex items-center gap-3">
            <span id="userBadge" class="bg-slate-800 px-3 py-1.5 rounded-xl text-sm font-semibold flex items-center gap-1">
                👑 <span id="currentUserName">Гость</span>
            </span>
            <button id="logoutBtn" class="bg-red-950/40 border border-red-800/60 hover:bg-red-900 text-red-400 p-2.5 rounded-xl text-sm transition">
                🚪 Выход
            </button>
        </div>
    </header>

    <main class="max-w-md w-full mx-auto flex-grow flex flex-col gap-4">
        
        <nav class="grid grid-cols-2 gap-2">
            <button id="navFeed" class="bg-cyan-500 text-slate-950 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition shadow-lg shadow-cyan-500/20">
                📰 Лента
            </button>
            <button id="navDirect" class="bg-slate-900 border border-slate-800 hover:border-slate-700 font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition">
                💬 Директ
            </button>
        </nav>

        <section id="screenFeed" class="flex flex-col gap-4">
            <div class="bg-slate-900/60 border border-slate-800 p-4 rounded-2xl flex flex-col gap-3">
                <textarea id="postInput" placeholder="Что транслируем в сеть? (используй #хэштеги)" class="bg-slate-950/80 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-cyan-500 resize-none h-24 text-slate-200 placeholder-slate-500"></style></textarea>
                <div class="flex justify-between items-center">
                    <div class="text-xl flex gap-1.5 opacity-80 select-none">
                        <span>🔥</span><span>🚀</span><span>😂</span><span>💻</span><span>👽</span>
                    </div>
                    <button id="publishBtn" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-5 py-2.5 rounded-xl text-sm transition shadow-md shadow-cyan-500/10">
                        Опубликовать пакет
                    </button>
                </div>
            </div>

            <div id="feedContainer" class="flex flex-col gap-3">
                </div>
        </section>

        <section id="screenDirect" class="hidden bg-slate-900/60 border border-slate-800 p-4 rounded-2xl flex flex-col gap-3">
            <h3 class="font-semibold text-slate-400 text-sm tracking-wider uppercase">Пользователи в сети</h3>
            <div id="usersContainer" class="flex flex-col gap-2">
                </div>
        </section>

    </main>

    <script>
        // --- КОНФИГУРАЦИЯ FIREBASE ---
        // ЗАМЕНИТЕ ЭТИ ДАННЫЕ НА СВОИ ИЗ ПАНЕЛИ FIREBASE!
        const firebaseConfig = {
            apiKey: "AIzaSyYourKeyHere",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234:web:abcd"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        let currentUser = localStorage.getItem('cyber_user') || null;
        let isAdmin = (currentUser === "Админ_Астемир");

        // Если пользователя нет, запрашиваем CYBER ID (Вход)
        if (!currentUser) {
            currentUser = prompt("Введите ваш CYBER ID (Никнейм) для входа в сеть:") || "Аноним_" + Math.floor(Math.random() * 1000);
            localStorage.setItem('cyber_user', currentUser);
            isAdmin = (currentUser === "Админ_Астемир");
        }

        // Запись пользователя в базу для отображения в Директе
        if(currentUser) {
            db.collection("users").doc(currentUser).set({
                username: currentUser,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                status: "online"
            }, { merge: true });
        }

        // Обновляем шапку
        document.getElementById('currentUserName').innerText = currentUser;
        if(isAdmin) {
            document.getElementById('userBadge').classList.add('border', 'border-yellow-500/50', 'text-yellow-400');
        }

        // --- ФИЛЬТР ЦЕНЗУРЫ / СПАМА ---
        function filterText(text) {
            const forbiddenWords = [/пипец/gi, /дурак/gi, /спам/gi]; // Сюда можно вписать любые стоп-слова
            let cleanText = text;
            forbiddenWords.forEach(word => {
                cleanText = cleanText.replace(word, '***');
            });
            return cleanText;
        }

        // --- НАВИГАЦИЯ МЕЖДУ ЭКРАНАМИ ---
        const navFeed = document.getElementById('navFeed');
        const navDirect = document.getElementById('navDirect');
        const screenFeed = document.getElementById('screenFeed');
        const screenDirect = document.getElementById('screenDirect');

        function switchScreen(toFeed) {
            if(toFeed) {
                screenFeed.classList.remove('hidden');
                screenDirect.classList.add('hidden');
                navFeed.className = "bg-cyan-500 text-slate-950 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition shadow-lg shadow-cyan-500/20";
                navDirect.className = "bg-slate-900 border border-slate-800 hover:border-slate-700 font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition";
            } else {
                screenFeed.classList.add('hidden');
                screenDirect.classList.remove('hidden');
                navDirect.className = "bg-cyan-500 text-slate-950 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition shadow-lg shadow-cyan-500/20";
                navFeed.className = "bg-slate-900 border border-slate-800 hover:border-slate-700 font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition";
            }
        }

        navFeed.addEventListener('click', () => switchScreen(true));
        navDirect.addEventListener('click', () => switchScreen(false));

        // Выход из аккаунта
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if(confirm("Отключиться от CYBER FEED?")) {
                db.collection("users").doc(currentUser).delete().then(() => {
                    localStorage.removeItem('cyber_user');
                    location.reload();
                });
            }
        });

        // --- ЛОГИКА ЛЕНТЫ И ПОСТОВ ---
        const postInput = document.getElementById('postInput');
        const publishBtn = document.getElementById('publishBtn');
        const feedContainer = document.getElementById('feedContainer');

        // Публикация поста
        publishBtn.addEventListener('click', async () => {
            const rawText = postInput.value.trim();
            if(!rawText) return;

            const cleanText = filterText(rawText);

            await db.collection("posts").add({
                author: currentUser,
                text: cleanText,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                likes: 0,
                likedBy: []
            });

            postInput.value = "";
        });

        // Стрим постов из базы в реальном времени (с сортировкой по времени)
        db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            feedContainer.innerHTML = "";
            snapshot.forEach(doc => {
                const post = doc.data();
                const postId = doc.id;
                const likedBy = post.likedBy || [];
                const isLiked = likedBy.includes(currentUser);

                const postEl = document.createElement('div');
                postEl.className = "bg-slate-900/40 border border-slate-850 p-4 rounded-2xl flex flex-col gap-2 relative transition hover:border-slate-800";
                
                postEl.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-semibold text-cyan-400 text-sm">@${post.author}</span>
                        <span class="text-xs text-slate-500">пакет актуален</span>
                    </div>
                    <p class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">${post.text}</p>
                    
                    <div class="flex items-center gap-4 mt-2 border-t border-slate-900/60 pt-2">
                        <button onclick="toggleLike('${postId}', ${isLiked})" class="flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1.5 rounded-lg transition ${isLiked ? 'bg-pink-950/40 text-pink-400 border border-pink-900/50' : 'bg-slate-950/60 text-slate-400 hover:text-slate-200'}">
                            ${isLiked ? '❤️' : '🤍'} <span>${post.likes || 0}</span>
                        </button>

                        ${isAdmin ? `<button onclick="deletePost('${postId}')" class="text-xs bg-red-950/40 text-red-400 border border-red-900/40 px-2.5 py-1.5 rounded-lg hover:bg-red-900 transition ml-auto">🗑️ Стереть (Админ)</button>` : ''}
                    </div>
                `;
                feedContainer.appendChild(postEl);
            });
        });

        // Функция лайка/дизлайка
        async function toggleLike(postId, isLiked) {
            const postRef = db.collection("posts").doc(postId);
            if (isLiked) {
                await postRef.update({
                    likes: firebase.firestore.FieldValue.increment(-1),
                    likedBy: firebase.firestore.FieldValue.arrayRemove(currentUser)
                });
            } else {
                await postRef.update({
                    likes: firebase.firestore.FieldValue.increment(1),
                    likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser)
                });
            }
        }

        // Функция удаления поста (Админка)
        async function deletePost(postId) {
            if(confirm("Стереть этот пакет данных из базы навсегда?")) {
                await db.collection("posts").doc(postId).delete();
            }
        }

        // --- ЛОГИКА ДИРЕКТА (СПИСОК ПОЛЬЗОВАТЕЛЕЙ) ---
        const usersContainer = document.getElementById('usersContainer');

        db.collection("users").onSnapshot(snapshot => {
            usersContainer.innerHTML = "";
            snapshot.forEach(doc => {
                const user = doc.data();
                if(user.username === currentUser) return; // Себя не выводим в список

                const userEl = document.createElement('div');
                userEl.className = "flex justify-between items-center bg-slate-950/50 border border-slate-900 p-3 rounded-xl";
                
                userEl.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-sm font-medium text-slate-300">@${user.username}</span>
                    </div>
                    ${isAdmin ? `<button onclick="banUser('${user.username}')" class="text-xs font-bold text-red-400 border border-red-900/50 bg-red-950/20 px-3 py-1 rounded-lg hover:bg-red-950 transition">❌ БАН</button>` : `<span class="text-xs text-slate-500">online</span>`}
                `;
                usersContainer.appendChild(userEl);
            });
        });

        // Функция бана пользователя (Админка)
        async function banUser(username) {
            if(confirm(`Заблокировать пользователя @${username} и стереть его сессию?`)) {
                await db.collection("users").doc(username).delete();
                alert(`Пользователь @${username} успешно удален из списка активных.`);
            }
        }
    </script>
</body>
</html>
