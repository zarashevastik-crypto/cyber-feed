<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER FEED 4.1</title>
    <style>
        :root { --bg: #0b0e14; --panel: #141923; --border: #222d3f; --accent: #00f2fe; --accent-grad: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); --text: #f4f6f9; }
        body.theme-neon { --bg: #000a12; --panel: #011124; --border: #00ffcc; --accent: #00ffcc; --accent-grad: linear-gradient(135deg, #00ffcc 0%, #00ccff 100%); --text: #e0ffff; text-shadow: 0 0 2px rgba(0,255,204,0.3); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px 15px 80px 15px; transition: background 0.3s, color 0.3s; }
        .container { max-width: 550px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent); text-shadow: 0 0 10px var(--accent); letter-spacing: 1px; }
        .header-tools { display: flex; gap: 10px; align-items: center; }
        .theme-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .notif-bell { position: relative; cursor: pointer; font-size: 20px; background: var(--panel); padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: #ff4a5a; color: white; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 10px; display: none; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: var(--panel); border: 1px solid var(--border); color: #8aa0c2; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.2s; }
        .tab-btn.active { background: var(--accent-grad); color: #000; border-color: transparent; }
        #authModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .auth-box { background: var(--panel); border: 2px solid var(--accent); padding: 25px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 30px rgba(0,242,254,0.1); }
        .pass-wrapper { position: relative; width: 100%; margin-top: 5px; }
        .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #627593; font-size: 16px; user-select: none; }
        input, textarea, select { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-size: 15px; outline: none; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(0,242,254,0.2); }
        textarea { resize: none; height: 60px; }
        .main-btn { width: 100%; background: var(--accent-grad); border: none; border-radius: 8px; color: #000; padding: 12px; font-weight: 800; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); }
        .tools-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .emoji-bar { display: flex; gap: 10px; font-size: 20px; user-select: none; }
        .emoji-bar span { cursor: pointer; }
        .file-label { background: rgba(0,0,0,0.3); color: var(--accent); padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold; border: 1px solid var(--border); }
        #previewImg { max-width: 100%; max-height: 150px; border-radius: 8px; margin-bottom: 10px; display: none; border: 1px solid var(--border); }
        .post { background: var(--panel); padding: 16px; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 15px; animation: fadeIn 0.4s ease; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .post-author { font-weight: bold; color: var(--accent); font-size: 15px; display: flex; align-items: center; gap: 6px; }
        .post-time { font-size: 11px; color: #627593; }
        .post-content { line-height: 1.4; font-size: 14px; word-break: break-word; margin-bottom: 10px; white-space: pre-wrap; }
        .post-image { max-width: 100%; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); }
        .hashtag { color: var(--accent); font-weight: bold; cursor: pointer; text-decoration: underline; }
        .post-actions { display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .action-btn { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .comments-section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: none; }
        .comment-item { font-size: 13px; background: rgba(0,0,0,0.2); padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .comment-author { color: var(--accent); font-weight: bold; }
        .del-comment { color: #ff4a5a; cursor: pointer; font-weight: bold; padding: 0 5px; }
        .dm-user-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .dm-user { background: rgba(0,0,0,0.2); padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; white-space: nowrap; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .dm-user.active { border-color: var(--accent); background: var(--panel); color: var(--accent); }
        .online-dot { display: inline-block; width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 5px #00ffcc; }
        .offline-dot { display: inline-block; width: 8px; height: 8px; background: #627593; border-radius: 50%; }
        .admin-kick-btn { background: #ff4a5a; color: #fff; border: none; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: bold; cursor: pointer; margin-left: 5px; }
        .unread-badge { background: #ff4a5a; color: white; font-size: 10px; padding: 1px 5px; border-radius: 8px; font-weight: bold; }
        .chat-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .call-btn { background: #00ffcc; color: #000; border: none; border-radius: 8px; padding: 6px 12px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .chat-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; height: 300px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 5px; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 13px; }
        .msg.mine { align-self: flex-end; background: var(--accent-grad); color: #000; font-weight: 500; }
        .msg.other { align-self: flex-start; background: var(--panel); color: var(--text); border: 1px solid var(--border); }
        .typing-indicator { font-size: 12px; color: var(--accent); font-style: italic; min-height: 16px; margin-bottom: 5px; }
        #notifModal { display: none; background: var(--panel); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .notif-item { font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--border); }
        #callOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,10,18,0.95); z-index: 2000; display: flex; justify-content: center; align-items: center; display: none; }
        .call-card { background: var(--panel); border: 2px solid var(--accent); padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 0 35px var(--accent); }
        .call-actions { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .call-action-btn { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; display: flex; justify-content: center; align-items: center; color: white; }
        .call-accept { background: #00ffcc; color: #000; }
        .call-decline { background: #ff4a5a; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="authModal">
        <div class="auth-box">
            <h2 style="color: var(--accent); margin-top:0; font-weight: 900; letter-spacing: 1px;">⚡ CYBER ID</h2>
            <input type="text" id="loginNick" placeholder="Твой никнейм (например, Астемир)">
            <div class="pass-wrapper">
                <input type="password" id="loginPassword" placeholder="Твой пароль" style="margin-bottom: 0;">
                <span class="toggle-pass" onclick="togglePasswordVisibility()">👁️</span>
            </div>
            <select id="loginAvatar" style="margin-top: 15px;">
                <option value="👑">👑 Лидер</option>
                <option value="⚡">⚡ Кибер</option>
                <option value="🤖">🤖 Хакер</option>
            </select>
            <button class="main-btn" onclick="login()" style="margin-top: 5px;">Подключиться</button>
        </div>
    </div>

    <div id="callOverlay">
        <div class="call-card">
            <div style="font-size: 50px;" id="callIcon">📞</div>
            <h3 id="callStatusTitle" style="color: var(--accent);">ВЫЗОВ...</h3>
            <p id="callUserTarget" style="font-size: 16px; font-weight: bold;"></p>
            <div id="callTimer" style="font-size: 14px; color: #8aa0c2; font-family: monospace;">00:00</div>
            <div class="call-actions">
                <button class="call-action-btn call-accept" id="btnAcceptCall" onclick="answerCall()">🟢</button>
                <button class="call-action-btn call-decline" onclick="hangUpCall()">🔴</button>
            </div>
        </div>
    </div>

    <div class="container" id="mainApp" style="display: none;">
        <header>
            <div class="logo">⚡ CF_4.1</div>
            <div class="header-tools">
                <button class="theme-btn" onclick="toggleTheme()">🌗</button>
                <span id="currentUserDisplay" style="font-size: 14px; font-weight: bold; color: var(--accent);"></span>
                <div class="notif-bell" onclick="toggleNotifModal()">
                    🔔 <span class="notif-badge" id="notifBadge">0</span>
                </div>
            </div>
        </header>

        <div id="notifModal"><b style="color: var(--accent); font-size: 14px;">Логи:</b><div id="notifList"></div></div>

        <div class="nav-tabs">
            <div class="tab-btn active" id="tabFeedBtn" onclick="switchTab('feed')">📰 Лента</div>
            <div class="tab-btn" id="tabDmBtn" onclick="switchTab('dm')">💬 Директ</div>
            <div class="tab-btn" onclick="logout()" style="flex: 0.4; background: rgba(255,74,90,0.1); color: #ff4a5a; border-color: rgba(255,74,90,0.3);">🚪</div>
        </div>

        <div id="tabFeed">
            <input type="text" id="searchInput" placeholder="🔍 Поиск...">
            <div style="background: var(--panel); padding: 15px; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 20px;">
                <textarea id="postInput" placeholder="Что транслируем в сеть?"></textarea>
                <img id="previewImg">
                <div class="tools-bar">
                    <div class="emoji-bar">
                        <span onclick="pressEmoji('🔥')">🔥</span>
                        <span onclick="pressEmoji('🚀')">🚀</span>
                    </div>
                    <label class="file-label">📎 Файл<input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)"></label>
                </div>
                <button class="main-btn" onclick="sendPost()">Опубликовать пакет</button>
            </div>
            <div id="feed"></div>
        </div>

        <div id="tabDm" class="hidden">
            <div class="dm-user-list" id="dmUserList"></div>
            <div id="chatArea" class="hidden">
                <div class="chat-header-bar">
                    <div style="font-weight: bold; color: var(--accent);" id="chatWithTitle"></div>
                    <button class="call-btn" onclick="startCall()">📞 Набрать</button>
                </div>
                <div class="chat-box" id="chatBox"></div>
                <div class="typing-indicator" id="typingIndicator"></div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="dmInput" placeholder="Сообщение..." style="margin-bottom: 0;" oninput="handleTyping()">
                    <button class="main-btn" style="width: 80px; padding: 0;" onclick="sendDm()">➡️</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDpVfyvm6r-KuH2xNdJSx93L12uYXjh2Bo",
            authDomain: "my-social-net.firebaseapp.com",
            databaseURL: "https://my-social-net-default-rtdb.firebaseio.com/",
            projectId: "my-social-net",
            storageBucket: "my-social-net.appspot.com",
            messagingSenderId: "998951685291",
            appId: "1:998951685291:web:01a734789a711860af3bee"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let compressedImageBase64 = null;
        let currentPostsArray = [];
        let searchQuery = "";
        let activeDmUser = null;
        let onlineUsers = {}; 
        let unreadChats = {}; 
        let isAdminMode = false; 
        let typingTimeout = null;

        let localStream = null;
        let peerConnection = null;
        let currentCallId = null;
        let callTimerInterval = null;
        let callSeconds = 0;

        const SECRET_ADMIN_NICK = "Админ_Астемир"; 
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if (type === 'click') { osc.frequency.setValueAtTime(800, ctx.currentTime); gain.gain.setValueAtTime(0.1, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.05); }
                else if (type === 'send') { osc.frequency.setValueAtTime(400, ctx.currentTime); gain.gain.setValueAtTime(0.05, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.1); }
            } catch(e) {}
        }

        window.onload = () => {
            const savedNick = localStorage.getItem("cyber_nick");
            const savedAvatar = localStorage.getItem("cyber_avatar");
            if (localStorage.getItem("cyber_theme") === 'neon') document.body.classList.add("theme-neon");
            if (savedNick && savedAvatar) {
                currentUser = { nick: savedNick, avatar: savedAvatar };
                isAdminMode = (currentUser.nick === SECRET_ADMIN_NICK);
                showMainApp();
                initApp();
            }
        };

        function togglePasswordVisibility() {
            const passInput = document.getElementById("loginPassword");
            passInput.type = passInput.type === "password" ? "text" : "password";
        }

        function login() {
            const nick = document.getElementById("loginNick").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            const avatar = document.getElementById("loginAvatar").value;
            if (!nick || !password) return alert("Заполните поля!");

            db.ref("users_passwords/" + nick).once("value", (snap) => {
                const existingPassword = snap.val();
                if (existingPassword !== null && existingPassword !== password) return alert("Неверный ключ!");
                if (existingPassword === null) db.ref("users_passwords/" + nick).set(password);

                currentUser = { nick, avatar };
                isAdminMode = (currentUser.nick === SECRET_ADMIN_NICK);
                localStorage.setItem("cyber_nick", nick);
                localStorage.setItem("cyber_avatar", avatar);
                showMainApp();
                initApp();
            });
        }

        function logout() {
            localStorage.removeItem("cyber_nick"); localStorage.removeItem("cyber_avatar");
            if (currentUser) db.ref("users_status/" + currentUser.nick).set(false);
            db.ref().off();
            location.reload();
        }

        function showMainApp() {
            document.getElementById("authModal").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("currentUserDisplay").innerText = `${currentUser.avatar} ${currentUser.nick}`;
        }

        function toggleTheme() {
            document.body.classList.toggle("theme-neon");
            localStorage.setItem("cyber_theme", document.body.classList.contains("theme-neon") ? "neon" : "dark");
        }

        function initApp() {
            const myStatusRef = db.ref("users_status/" + currentUser.nick);
            db.ref(".info/connected").on("value", (snap) => {
                if (snap.val() === true) { myStatusRef.onDisconnect().set(false); myStatusRef.set(true); }
            });

            db.ref("users_status").on("value", (snap) => { onlineUsers = snap.val() || {}; updateDmListUI(); });

            db.ref("posts").limitToLast(40).on("value", (snapshot) => {
                currentPostsArray = [];
                snapshot.forEach((child) => { const post = child.val(); post.id = child.key; currentPostsArray.push(post); });
                renderFeed(); updateDmListUI();
            });

            db.ref("notifications/" + currentUser.nick).on("value", (snapshot) => {
                const notifList = document.getElementById("notifList"); notifList.innerHTML = ""; let count = 0;
                snapshot.forEach((child) => { count++; const n = child.val(); notifList.innerHTML += `<div class="notif-item">🔔 <b>${n.from}</b>: ${n.text}</div>`; });
                const badge = document.getElementById("notifBadge");
                badge.style.display = count > 0 ? "inline-block" : "none"; badge.innerText = count;
            });

            db.ref("directs").on("value", (snap) => {
                unreadChats = {};
                snap.forEach((roomSnap) => {
                    const roomId = roomSnap.key;
                    if (roomId.includes(currentUser.nick)) {
                        const targetUser = roomId.replace(currentUser.nick, "").replace("_", "");
                        if (targetUser !== activeDmUser) {
                            let lastMsg = null; roomSnap.forEach((msgSnap) => { lastMsg = msgSnap.val(); });
                            if (lastMsg && lastMsg.from !== currentUser.nick) unreadChats[targetUser] = true;
                        }
                    }
                });
                updateDmListUI();
            });

            // ОПТИМИЗИРОВАННЫЙ СЛУШАТЕЛЬ ЗВОНКОВ: Слушаем только самые новые события, а не всю историю!
            db.ref("calls").orderByChild("timestamp").startAt(Date.now() - 10000).on("child_added", (childSnap) => {
                const call = childSnap.val();
                if (call.to === currentUser.nick && call.status === "calling" && currentCallId !== childSnap.key) {
                    showIncomingCallWindow(childSnap.key, call.from);
                }
            });
        }

        /* ЗВОНКИ WebRTC */
        function startCall() {
            if (!activeDmUser) return;
            if (onlineUsers[activeDmUser] !== true) return alert("Пользователь не в сети.");
            playSound('click');

            currentCallId = currentUser.nick + "_to_" + activeDmUser + "_" + Date.now();
            document.getElementById("callUserTarget").innerText = activeDmUser;
            document.getElementById("callStatusTitle").innerText = "НАБОР...";
            document.getElementById("btnAcceptCall").style.display = "none";
            document.getElementById("callOverlay").style.display = "flex";

            navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then((stream) => {
                localStream = stream;
                db.ref("calls/" + currentCallId).set({ from: currentUser.nick, to: activeDmUser, status: "calling", timestamp: Date.now() });

                db.ref("calls/" + currentCallId).on("value", (snap) => {
                    const call = snap.val(); if (!call) return;
                    if (call.status === "accepted") startDirectAudioConversation(false);
                    if (call.status === "hungup") closeCallInterfaceAndStream();
                });
            }).catch(() => { alert("Нужен микрофон!"); hangUpCall(); });
        }

        function showIncomingCallWindow(callId, fromUser) {
            currentCallId = callId;
            document.getElementById("callUserTarget").innerText = fromUser;
            document.getElementById("callStatusTitle").innerText = "ВХОДЯЩИЙ ВЫЗОВ...";
            document.getElementById("btnAcceptCall").style.display = "block";
            document.getElementById("callOverlay").style.display = "flex";

            db.ref("calls/" + currentCallId).on("value", (snap) => {
                const call = snap.val(); if (call && call.status === "hungup") closeCallInterfaceAndStream();
            });
        }

        function answerCall() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then((stream) => {
                localStream = stream;
                db.ref("calls/" + currentCallId).update({ status: "accepted" });
                startDirectAudioConversation(true);
            }).catch(() => { alert("Включите микрофон!"); hangUpCall(); });
        }

        function startDirectAudioConversation(isAnswerer) {
            document.getElementById("callStatusTitle").innerText = "РАЗГОВОР";
            document.getElementById("btnAcceptCall").style.display = "none";
            startCallTimer();

            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (e) => { document.getElementById("remoteAudio").srcObject = e.streams[0]; };

            peerConnection.onicecandidate = (e) => {
                if (e.candidate) db.ref(`calls/${currentCallId}/ice_${isAnswerer ? 'answer' : 'offer'}`).push(e.candidate.toJSON());
            };

            const offerRef = db.ref(`calls/${currentCallId}/sdp_offer`);
            const answerRef = db.ref(`calls/${currentCallId}/sdp_answer`);

            if (!isAnswerer) {
                peerConnection.createOffer().then(o => peerConnection.setLocalDescription(o)).then(() => offerRef.set(peerConnection.localDescription.toJSON()));
                answerRef.on("value", (snap) => {
                    const d = snap.val(); if (d && !peerConnection.currentRemoteDescription) peerConnection.setRemoteDescription(new RTCSessionDescription(d));
                });
                db.ref(`calls/${currentCallId}/ice_answer`).on("child_added", (s) => peerConnection.addIceCandidate(new RTCIceCandidate(s.val())));
            } else {
                offerRef.on("value", (snap) => {
                    const d = snap.val();
                    if (d && !peerConnection.currentLocalDescription) {
                        peerConnection.setRemoteDescription(new RTCSessionDescription(d)).then(() => peerConnection.createAnswer()).then(a => peerConnection.setLocalDescription(a)).then(() => answerRef.set(peerConnection.localDescription.toJSON()));
                    }
                });
                db.ref(`calls/${currentCallId}/ice_offer`).on("child_added", (s) => peerConnection.addIceCandidate(new RTCIceCandidate(s.val())));
            }
        }

        function hangUpCall() {
            if (currentCallId) {
                db.ref("calls/" + currentCallId).update({ status: "hungup" });
                const id = currentCallId; setTimeout(() => { db.ref("calls/" + id).remove(); }, 1500);
            }
            closeCallInterfaceAndStream();
        }

        function closeCallInterfaceAndStream() {
            clearInterval(callTimerInterval); document.getElementById("callTimer").innerText = "00:00";
            document.getElementById("callOverlay").style.display = "none";
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            document.getElementById("remoteAudio").srcObject = null; currentCallId = null;
        }

        function startCallTimer() {
            clearInterval(callTimerInterval); callSeconds = 0;
            callTimerInterval = setInterval(() => {
                callSeconds++;
                const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
                const s = String(callSeconds % 60).padStart(2, '0');
                document.getElementById("callTimer").innerText = `${m}:${s}`;
            }, 1000);
        }

        /* ПОСТЫ И КАРТИНКИ (Оптимизированное ультра-сжатие Base64) */
        function handleImageUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    const MAX_WIDTH = 300; // Сжали еще сильнее до 300px, чтобы база не тормозила вообще
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH; canvas.height = img.height * scale;
                    const ctx = canvas.getContext("2d"); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    compressedImageBase64 = canvas.toDataURL("image/jpeg", 0.4); // Качество 40% (весит копейки)
                    document.getElementById("previewImg").src = compressedImageBase64;
                    document.getElementById("previewImg").style.display = "block";
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function sendPost() {
            const text = document.getElementById("postInput").value.trim();
            if (!text && !compressedImageBase64) return alert("Пакет пуст!");
            db.ref("posts").push({ author: currentUser.nick, avatar: currentUser.avatar, content: text, image: compressedImageBase64, createdAt: Date.now(), likes: 0, likedBy: {} });
            document.getElementById("postInput").value = ""; document.getElementById("previewImg").style.display = "none";
            compressedImageBase64 = null; playSound('send');
        }

        function removePost(postId) {
            if (confirm("Стереть этот пост навсегда?")) {
                db.ref(`posts/${postId}`).remove().then(() => {
                    playSound('click');
                }).catch(err => alert("Ошибка базы: " + err.message));
            }
        }

        function likePost(postId, authorNick) {
            const postRef = db.ref("posts/" + postId);
            postRef.once("value", (s) => {
                const post = s.val(); if(!post) return; let likes = post.likes || 0; let likedBy = post.likedBy || {};
                if (likedBy[currentUser.nick]) { likes--; delete likedBy[currentUser.nick]; } 
                else { likes++; likedBy[currentUser.nick] = true; if (authorNick !== currentUser.nick) db.ref("notifications/" + authorNick).push({ from: currentUser.nick, text: "❤️" }); }
                postRef.update({ likes, likedBy });
            });
        }

        function toggleComments(postId) { const sec = document.getElementById("comments-" + postId); sec.style.display = sec.style.display === "block" ? "none" : "block"; }
        function sendComment(postId, authorNick) {
            const input = document.getElementById("commInput-" + postId); const text = input.value.trim(); if (!text) return;
            db.ref("posts/" + postId + "/comments").push({ author: currentUser.nick, text: text, time: Date.now() });
            if (authorNick !== currentUser.nick) db.ref("notifications/" + authorNick).push({ from: currentUser.nick, text: `коммент: "${text}"` });
            input.value = ""; playSound('send');
        }

        function deleteComment(postId, commentId) { if (confirm("Стереть комментарий?")) db.ref("posts/" + postId + "/comments/" + commentId).remove(); }

        function adminKickUser(userNick) {
            if (confirm(`Удалить аккаунт ${userNick}?`)) {
                db.ref("users_status/" + userNick).remove(); db.ref("users_passwords/" + userNick).remove();
                db.ref("posts").once("value", (snap) => { snap.forEach((child) => { if (child.val().author === userNick) db.ref("posts/" + child.key).remove(); }); });
            }
        }

        function updateDmListUI() {
            const usersSet = new Set();
            currentPostsArray.forEach(p => { if (p.author && p.author !== currentUser.nick) usersSet.add(p.author); });
            Object.keys(onlineUsers).forEach(u => { if (u !== currentUser.nick) usersSet.add(u); });
            const list = document.getElementById("dmUserList"); list.innerHTML = "";
            usersSet.forEach(u => {
                const isOnline = onlineUsers[u] === true;
                const adminBtn = isAdminMode ? `<button class="admin-kick-btn" onclick="event.stopPropagation(); adminKickUser('${u}')">❌</button>` : '';
                list.innerHTML += `<div class="dm-user ${activeDmUser === u ? 'active' : ''}" onclick="openChat('${u}')">👤 ${u} <span class="${isOnline ? 'online-dot' : 'offline-dot'}"></span> ${unreadChats[u] ? '✉️' : ''} ${adminBtn}</div>`;
            });
        }

        function handleTyping() {
            if (!activeDmUser) return;
            const roomId = [currentUser.nick, activeDmUser].sort().join("_"); db.ref(`typing/${roomId}/${currentUser.nick}`).set(true);
            clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { db.ref(`typing/${roomId}/${currentUser.nick}`).set(false); }, 2000);
        }

        function openChat(targetUser) {
            activeDmUser = targetUser; if (unreadChats[targetUser]) delete unreadChats[targetUser];
            document.getElementById("chatArea").classList.remove("hidden");
            document.getElementById("chatWithTitle").innerText = `Канал: ${targetUser}`; updateDmListUI();
            const roomId = [currentUser.nick, targetUser].sort().join("_");
            db.ref("directs/" + roomId).off();
            db.ref("directs/" + roomId).on("value", (s) => {
                const box = document.getElementById("chatBox"); box.innerHTML = "";
                s.forEach(child => { const m = child.val(); const isMine = m.from === currentUser.nick; box.innerHTML += `<div class="msg ${isMine ? 'mine' : 'other'}"><b>${isMine ? 'Вы' : m.from}:</b> ${m.text}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
            db.ref(`typing/${roomId}/${targetUser}`).off();
            db.ref(`typing/${roomId}/${targetUser}`).on("value", (snap) => { document.getElementById("typingIndicator").innerText = snap.val() ? `${targetUser} пишет...` : ""; });
        }

        function sendDm() {
            const input = document.getElementById("dmInput"); const text = input.value.trim(); if (!text || !activeDmUser) return;
            const roomId = [currentUser.nick, activeDmUser].sort().join("_"); db.ref(`typing/${roomId}/${currentUser.nick}`).set(false);
            db.ref("directs/" + roomId).push({ from: currentUser.nick, text: text, time: Date.now() });
            db.ref("notifications/" + activeDmUser).push({ from: currentUser.nick, text: "✉️" });
            input.value = ""; playSound('send');
        }

        function switchTab(tab) {
            document.getElementById("tabFeed").className = tab === 'feed' ? '' : 'hidden'; document.getElementById("tabDm").className = tab === 'dm' ? '' : 'hidden';
            document.getElementById("tabFeedBtn").className = `tab-btn ${tab === 'feed' ? 'active' : ''}`; document.getElementById("tabDmBtn").className = `tab-btn ${tab === 'dm' ? 'active' : ''}`;
        }
        function toggleNotifModal() { const m = document.getElementById("notifModal"); m.style.display = m.style.display === "block" ? "none" : "block"; if (m.style.display === "block") db.ref("notifications/" + currentUser.nick).remove(); }
        function pressEmoji(emoji) { document.getElementById("postInput").value += emoji; document.getElementById("postInput").focus(); }
        function filterTag(tag) { document.getElementById("searchInput").value = tag; searchQuery = tag.toLowerCase(); renderFeed(); }
        document.getElementById("searchInput").addEventListener("input", (e) => { searchQuery = e.target.value.toLowerCase().trim(); renderFeed(); });

        function renderFeed() {
            const feedHTML = document.getElementById("feed"); feedHTML.innerHTML = "";
            [...currentPostsArray].reverse().forEach((post) => {
                const authorNick = post.author || "Аноним"; let contentText = post.content || "";
                if (searchQuery && !authorNick.toLowerCase().includes(searchQuery) && !contentText.toLowerCase().includes(searchQuery)) return;
                contentText = contentText.replace(/(#[а-яА-Яa-zA-Z0-9_]+)/g, `<span class="hashtag" onclick="filterTag('$1')">$1</span>`);
                let commentsHTML = "";
                if (post.comments) {
                    Object.entries(post.comments).forEach(([commId, c]) => {
                        commentsHTML += `<div class="comment-item"><div><b>${c.author}:</b> ${c.text}</div>${(c.author===currentUser.nick||isAdminMode)?`<span class="del-comment" onclick="deleteComment('${post.id}','${commId}')">×</span>`:''}</div>`;
                    });
                }
                const delBtn = (authorNick===currentUser.nick || isAdminMode)?`<button class="action-btn" style="${isAdminMode && authorNick!==currentUser.nick ? 'color:#ff4a5a; border-color:#ff4a5a;' : ''}" onclick="removePost('${post.id}')">🗑️ ${isAdminMode && authorNick!==currentUser.nick ? 'Удалить (Админ)' : 'Стереть'}</button>`:'';
                feedHTML.innerHTML += `<div class="post"><div class="post-header"><div class="post-author">${post.avatar||'👤'} ${authorNick}</div></div><div class="post-content">${contentText}</div>${post.image?`<img src="${post.image}" class="post-image">`:''}<div class="post-actions"><button class="action-btn" onclick="likePost('${post.id}','${authorNick}')">❤️ <span>${post.likes||0}</span></button><button class="action-btn" onclick="toggleComments('${post.id}')">💬 Комменты</button>${delBtn}</div><div class="comments-section" id="comments-${post.id}">${commentsHTML}<div style="display:flex; gap:5px; margin-top:8px;"><input type="text" id="commInput-${post.id}" placeholder="Ответ..." style="margin:0; padding:8px;"><button class="main-btn" style="width:50px; padding:8px;" onclick="sendComment('${post.id}','${authorNick}')">ОК</button></div></div></div>`;
            });
        }
    </script>
</body>
</html>
